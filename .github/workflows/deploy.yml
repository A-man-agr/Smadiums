name: Deploy Smadiums to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: YOUR_GCP_PROJECT_ID # Replace with your Google Cloud Project ID
  SERVICE_NAME: smadiums-hub
  REGION: us-central1

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Since we have zero external runtime dependencies, we run tests directly:
      - name: Execute Verification Tests
        run: node tests/run-tests.js

